<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2b1b17" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Practice" />
  <title>Practice</title>
  <style>
    :root{
      --bg1:#2c1b18;
      --bg2:#5a3425;
      --bg3:#b06b3b;
      --cream:#f7ead8;
      --muted:#d9c1aa;
      --glass:rgba(255,255,255,.10);
      --glass-border:rgba(255,255,255,.14);
      --shadow:0 22px 60px rgba(20,8,4,.34);
      --accent:#f2b36f;
      --accent2:#d67a3c;
      --danger:#b8513f;
    }

    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;color:var(--cream);background:#2c1b18}
    body{
      min-height:100dvh;
      background:
        radial-gradient(circle at 50% 12%, rgba(255,190,120,.22), transparent 28%),
        radial-gradient(circle at 85% 90%, rgba(214,122,60,.20), transparent 30%),
        linear-gradient(160deg,var(--bg1),var(--bg2) 54%,var(--bg3));
      background-attachment:fixed;
      overflow-x:hidden;
    }

    .shell{
      width:min(100%,520px);
      margin:0 auto;
      min-height:100dvh;
      padding:max(24px,env(safe-area-inset-top)) 18px max(24px,env(safe-area-inset-bottom));
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:4px 4px 0;
    }

    .brand{
      letter-spacing:.18em;
      font-size:.76rem;
      font-weight:700;
      color:rgba(247,234,216,.78);
    }

    .icon-btn{
      border:0;
      background:var(--glass);
      color:var(--cream);
      width:42px;height:42px;border-radius:50%;
      font-size:1.3rem;
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      box-shadow:inset 0 0 0 1px var(--glass-border);
    }

    .hero{
      flex:1;
      min-height:430px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      position:relative;
    }

    .eyebrow{
      font-size:.86rem;
      color:var(--muted);
      margin-bottom:18px;
      letter-spacing:.04em;
    }

    .timer{
      font-size:clamp(3.6rem,16vw,5.6rem);
      font-variant-numeric:tabular-nums;
      line-height:1;
      letter-spacing:-.06em;
      margin-bottom:28px;
      text-shadow:0 8px 28px rgba(30,10,5,.28);
    }

    .orb{
      width:235px;
      aspect-ratio:1;
      border-radius:50%;
      border:0;
      color:#3c2118;
      font-size:1rem;
      font-weight:800;
      letter-spacing:.11em;
      background:
        radial-gradient(circle at 35% 28%, #ffe0af 0%, #f7bb79 28%, #dc8347 68%, #a94c2d 100%);
      box-shadow:
        0 26px 70px rgba(76,29,9,.45),
        0 0 0 12px rgba(255,255,255,.035),
        inset 0 5px 12px rgba(255,255,255,.38),
        inset 0 -14px 25px rgba(91,31,12,.28);
      transition:transform .22s ease, filter .22s ease, box-shadow .22s ease;
      position:relative;
      overflow:hidden;
    }

    .orb::after{
      content:"";
      position:absolute;
      inset:0;
      border-radius:inherit;
      background:linear-gradient(140deg,rgba(255,255,255,.34),transparent 32%,transparent 70%,rgba(255,255,255,.08));
      pointer-events:none;
    }

    .orb:active{transform:scale(.97)}
    .orb.running{
      animation:pulse 2.3s ease-in-out infinite;
      background:radial-gradient(circle at 35% 28%, #ffd4aa 0%, #e98855 34%, #bc5139 72%, #7a2f28 100%);
      color:#fff4e8;
    }

    @keyframes pulse{
      0%,100%{box-shadow:0 26px 70px rgba(76,29,9,.45),0 0 0 12px rgba(255,255,255,.035),inset 0 5px 12px rgba(255,255,255,.35),inset 0 -14px 25px rgba(91,31,12,.28)}
      50%{box-shadow:0 30px 82px rgba(124,43,24,.58),0 0 0 18px rgba(255,177,112,.06),inset 0 5px 12px rgba(255,255,255,.35),inset 0 -14px 25px rgba(91,31,12,.28)}
    }

    .subline{
      min-height:24px;
      margin-top:24px;
      color:rgba(247,234,216,.76);
      font-size:.96rem;
    }

    .stats-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
    }

    .card{
      background:var(--glass);
      border-radius:22px;
      padding:16px;
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      box-shadow:inset 0 0 0 1px var(--glass-border),var(--shadow);
    }

    .stat-label{
      color:var(--muted);
      font-size:.72rem;
      letter-spacing:.06em;
      text-transform:uppercase;
      margin-bottom:7px;
    }

    .stat-value{
      font-size:1.22rem;
      font-weight:700;
    }

    .week-card{padding:18px 16px}
    .week-head{display:flex;justify-content:space-between;align-items:end;margin-bottom:16px}
    .week-title{font-size:1.05rem;font-weight:700}
    .week-total{font-size:.9rem;color:var(--muted)}
    .bars{display:grid;grid-template-columns:repeat(7,1fr);gap:9px;align-items:end;height:110px}
    .day{display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end}
    .bar-track{height:84px;width:100%;border-radius:999px;background:rgba(255,255,255,.07);display:flex;align-items:flex-end;overflow:hidden}
    .bar-fill{width:100%;min-height:4px;border-radius:999px;background:linear-gradient(180deg,#f7c486,#d9793f);box-shadow:0 0 16px rgba(242,179,111,.20)}
    .day-label{font-size:.7rem;color:rgba(247,234,216,.65)}

    .footer-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .secondary{
      border:0;
      border-radius:18px;
      padding:15px 14px;
      font-weight:700;
      font-size:.95rem;
      background:rgba(255,255,255,.11);
      color:var(--cream);
      box-shadow:inset 0 0 0 1px var(--glass-border);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
    }

    dialog{
      width:min(calc(100% - 28px),480px);
      border:0;
      border-radius:28px;
      padding:0;
      color:#3b241b;
      background:#f7ead8;
      box-shadow:0 28px 90px rgba(20,8,4,.55);
    }
    dialog::backdrop{background:rgba(20,8,4,.56);backdrop-filter:blur(8px)}
    .modal{padding:22px}
    .modal h2{margin:0 0 6px;font-size:1.45rem}
    .modal p{margin:0 0 18px;color:#765b4d}
    .field{display:grid;gap:7px;margin-bottom:14px}
    label{font-size:.82rem;font-weight:700;color:#654b3f}
    input,textarea{
      width:100%;border:1px solid rgba(83,47,31,.16);border-radius:14px;padding:13px 14px;
      font:inherit;background:rgba(255,255,255,.64);color:#3b241b;outline:none
    }
    textarea{resize:vertical;min-height:78px}
    .quick{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
    .chip{border:0;border-radius:999px;padding:9px 12px;background:#ead7c1;color:#5e3d2c;font-weight:700}
    .modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
    .cancel,.save{border:0;border-radius:16px;padding:14px;font-weight:800}
    .cancel{background:#ead7c1;color:#5e3d2c}
    .save{background:#9a4f2d;color:white}

    .history-list{display:grid;gap:10px;max-height:46vh;overflow:auto;margin-top:16px}
    .history-item{display:flex;justify-content:space-between;gap:14px;padding:14px;border-radius:16px;background:rgba(104,61,40,.08)}
    .history-main{min-width:0}
    .history-date{font-weight:800}
    .history-note{font-size:.84rem;color:#765b4d;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px}
    .history-duration{font-weight:800;white-space:nowrap}
    .empty{color:#765b4d;text-align:center;padding:24px 0}

    @media (max-width:380px){
      .orb{width:210px}
      .stats-grid{grid-template-columns:1fr}
      .hero{min-height:390px}
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div class="brand">PRACTICE</div>
      <button class="icon-btn" id="menuButton" aria-label="Open history">•••</button>
    </header>

    <section class="hero">
      <div class="eyebrow" id="eyebrow">Ready when you are.</div>
      <div class="timer" id="timer">00:00</div>
      <button class="orb" id="practiceButton">START PRACTICE</button>
      <div class="subline" id="subline">Tap once. Play. Tap again.</div>
    </section>

    <section class="stats-grid">
      <div class="card">
        <div class="stat-label">This week</div>
        <div class="stat-value" id="weekStat">0m</div>
      </div>
      <div class="card">
        <div class="stat-label">This month</div>
        <div class="stat-value" id="monthStat">0m</div>
      </div>
      <div class="card">
        <div class="stat-label">Your journey</div>
        <div class="stat-value" id="totalStat">0m</div>
      </div>
    </section>

    <section class="card week-card">
      <div class="week-head">
        <div class="week-title">Your week</div>
        <div class="week-total" id="sessionsStat">0 sessions</div>
      </div>
      <div class="bars" id="bars"></div>
    </section>

    <section class="footer-actions">
      <button class="secondary" id="manualButton">＋ Log session</button>
      <button class="secondary" id="historyButton">View history</button>
    </section>
  </main>

  <dialog id="manualDialog">
    <form method="dialog" class="modal" id="manualForm">
      <h2>Log a session</h2>
      <p>Add a practice you already completed.</p>

      <div class="quick">
        <button type="button" class="chip" data-minutes="15">15 min</button>
        <button type="button" class="chip" data-minutes="30">30 min</button>
        <button type="button" class="chip" data-minutes="45">45 min</button>
        <button type="button" class="chip" data-minutes="60">60 min</button>
      </div>

      <div class="field">
        <label for="sessionDate">Date</label>
        <input id="sessionDate" type="date" required />
      </div>
      <div class="field">
        <label for="sessionMinutes">Minutes</label>
        <input id="sessionMinutes" type="number" min="1" step="1" inputmode="numeric" required />
      </div>
      <div class="field">
        <label for="sessionNote">Note (optional)</label>
        <textarea id="sessionNote" placeholder="Worked on barre chords..."></textarea>
      </div>

      <div class="modal-actions">
        <button class="cancel" value="cancel">Cancel</button>
        <button class="save" id="saveManual" value="default">Save session</button>
      </div>
    </form>
  </dialog>

  <dialog id="historyDialog">
    <div class="modal">
      <h2>Practice history</h2>
      <p>Every session, all in one place.</p>
      <div class="history-list" id="historyList"></div>
      <div class="modal-actions">
        <button class="cancel" id="closeHistory">Close</button>
        <button class="save" id="exportButton">Export backup</button>
      </div>
    </div>
  </dialog>

  <script>
    const STORAGE_KEY = "practiceSessionsV1";
    const RUNNING_KEY = "practiceRunningV1";

    let sessions = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    let runningStart = localStorage.getItem(RUNNING_KEY);
    let tickInterval = null;

    const timerEl = document.getElementById("timer");
    const practiceButton = document.getElementById("practiceButton");
    const eyebrow = document.getElementById("eyebrow");
    const subline = document.getElementById("subline");
    const manualDialog = document.getElementById("manualDialog");
    const historyDialog = document.getElementById("historyDialog");
    const sessionDate = document.getElementById("sessionDate");
    const sessionMinutes = document.getElementById("sessionMinutes");
    const sessionNote = document.getElementById("sessionNote");

    function saveSessions(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
      render();
    }

    function formatDuration(minutes){
      const rounded = Math.max(0, Math.round(minutes));
      const h = Math.floor(rounded / 60);
      const m = rounded % 60;
      if (h && m) return `${h}h ${m}m`;
      if (h) return `${h}h`;
      return `${m}m`;
    }

    function formatTimer(ms){
      const totalSeconds = Math.floor(ms / 1000);
      const h = Math.floor(totalSeconds / 3600);
      const m = Math.floor((totalSeconds % 3600) / 60);
      const s = totalSeconds % 60;
      if (h > 0) return [h,m,s].map(n => String(n).padStart(2,"0")).join(":");
      return [m,s].map(n => String(n).padStart(2,"0")).join(":");
    }

    function startTimer(){
      runningStart = new Date().toISOString();
      localStorage.setItem(RUNNING_KEY, runningStart);
      updateRunningUI();
      tickInterval = setInterval(updateTimer, 1000);
      updateTimer();
      if (navigator.vibrate) navigator.vibrate(20);
    }

    function stopTimer(){
      const start = new Date(runningStart);
      const end = new Date();
      const minutes = Math.max(1, Math.round((end - start) / 60000));
      sessions.push({
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
        date: end.toISOString(),
        minutes,
        note: ""
      });
      runningStart = null;
      localStorage.removeItem(RUNNING_KEY);
      clearInterval(tickInterval);
      timerEl.textContent = "00:00";
      saveSessions();
      updateRunningUI();
      eyebrow.textContent = "Session saved.";
      subline.textContent = `${formatDuration(minutes)} of music today.`;
      setTimeout(() => {
        if (!runningStart) {
          eyebrow.textContent = "Ready when you are.";
          subline.textContent = "Tap once. Play. Tap again.";
        }
      }, 2400);
      if (navigator.vibrate) navigator.vibrate([25,50,25]);
    }

    function updateTimer(){
      if (!runningStart) return;
      timerEl.textContent = formatTimer(Date.now() - new Date(runningStart).getTime());
    }

    function updateRunningUI(){
      const active = !!runningStart;
      practiceButton.classList.toggle("running", active);
      practiceButton.textContent = active ? "STOP PRACTICE" : "START PRACTICE";
      eyebrow.textContent = active ? "You’re making music." : "Ready when you are.";
      subline.textContent = active ? "Stay here as long as you like." : "Tap once. Play. Tap again.";
      if (active && !tickInterval) tickInterval = setInterval(updateTimer,1000);
    }

    function startOfWeek(date){
      const d = new Date(date);
      const day = d.getDay();
      const diff = (day + 6) % 7;
      d.setHours(0,0,0,0);
      d.setDate(d.getDate() - diff);
      return d;
    }

    function render(){
      const now = new Date();
      const weekStart = startOfWeek(now);
      const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);

      const weekSessions = sessions.filter(s => new Date(s.date) >= weekStart);
      const monthSessions = sessions.filter(s => new Date(s.date) >= monthStart);

      const sum = arr => arr.reduce((a,s) => a + Number(s.minutes || 0), 0);

      document.getElementById("weekStat").textContent = formatDuration(sum(weekSessions));
      document.getElementById("monthStat").textContent = formatDuration(sum(monthSessions));
      document.getElementById("totalStat").textContent = formatDuration(sum(sessions));
      document.getElementById("sessionsStat").textContent = `${weekSessions.length} session${weekSessions.length===1?"":"s"}`;

      const totals = Array(7).fill(0);
      weekSessions.forEach(s => {
        const d = new Date(s.date);
        const index = Math.floor((new Date(d.getFullYear(),d.getMonth(),d.getDate()) - weekStart) / 86400000);
        if (index >= 0 && index < 7) totals[index] += Number(s.minutes || 0);
      });

      const max = Math.max(...totals, 30);
      const labels = ["M","T","W","T","F","S","S"];
      const bars = document.getElementById("bars");
      bars.innerHTML = totals.map((v,i) => `
        <div class="day" title="${v} minutes">
          <div class="bar-track"><div class="bar-fill" style="height:${Math.max(5,(v/max)*100)}%"></div></div>
          <div class="day-label">${labels[i]}</div>
        </div>`).join("");

      renderHistory();
    }

    function renderHistory(){
      const list = document.getElementById("historyList");
      const sorted = [...sessions].sort((a,b) => new Date(b.date)-new Date(a.date));
      if (!sorted.length){
        list.innerHTML = `<div class="empty">Your first session will appear here.</div>`;
        return;
      }
      list.innerHTML = sorted.map(s => {
        const d = new Date(s.date);
        const dateText = d.toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"});
        return `<div class="history-item">
          <div class="history-main">
            <div class="history-date">${dateText}</div>
            <div class="history-note">${s.note ? escapeHtml(s.note) : "Practice session"}</div>
          </div>
          <div class="history-duration">${formatDuration(s.minutes)}</div>
        </div>`;
      }).join("");
    }

    function escapeHtml(str){
      return str.replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]));
    }

    practiceButton.addEventListener("click", () => runningStart ? stopTimer() : startTimer());

    document.getElementById("manualButton").addEventListener("click", () => {
      sessionDate.value = new Date().toISOString().slice(0,10);
      sessionMinutes.value = "";
      sessionNote.value = "";
      manualDialog.showModal();
    });

    document.querySelectorAll(".chip").forEach(chip => {
      chip.addEventListener("click", () => sessionMinutes.value = chip.dataset.minutes);
    });

    document.getElementById("manualForm").addEventListener("submit", e => {
      if (e.submitter?.value === "cancel") return;
      e.preventDefault();
      const minutes = Number(sessionMinutes.value);
      if (!sessionDate.value || !minutes || minutes < 1) return;
      const localDate = new Date(`${sessionDate.value}T12:00:00`);
      sessions.push({
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
        date: localDate.toISOString(),
        minutes,
        note: sessionNote.value.trim()
      });
      saveSessions();
      manualDialog.close();
    });

    const openHistory = () => { renderHistory(); historyDialog.showModal(); };
    document.getElementById("historyButton").addEventListener("click", openHistory);
    document.getElementById("menuButton").addEventListener("click", openHistory);
    document.getElementById("closeHistory").addEventListener("click", () => historyDialog.close());

    document.getElementById("exportButton").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(sessions,null,2)], {type:"application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `practice-backup-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    });

    render();
    updateRunningUI();
    updateTimer();
  </script>
</body>
</html>
